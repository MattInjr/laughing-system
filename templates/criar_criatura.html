<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Criatura — {{ campanha.nome }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .criatura-form { max-width: 700px; margin: 40px auto; padding: 30px; background: #111; border: 1px solid #333; }
        .criatura-form h1 { color: #bbb; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-full { grid-column: 1/-1; }
        .form-campo label { display: block; font-size: .8rem; color: #888; margin-bottom: 3px; }
        .form-campo input, .form-campo textarea, .form-campo select {
            width: 100%; padding: 7px; background: #1a1a1a; border: 1px solid #444; color: #fff;
        }
        .form-campo textarea { height: 80px; resize: vertical; }
        .form-acoes { margin-top: 20px; display: flex; gap: 10px; }
        .vd-preview { background: #1a2a1a; border: 1px solid #3a5a3a; padding: 8px 12px; margin-top: 10px; font-size: .85rem; color: #8f8; }
    </style>
</head>
<body style="background:#0d0d0d; color:#e0e0e0;">
<div class="criatura-form">
    <h1>🐉 Nova Criatura — {{ campanha.nome }}</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-campo form-full">
                <label>Nome</label>
                <input name="nome" placeholder="Goblin Arqueiro" required>
            </div>
            <div class="form-campo">
                <label>Nível</label>
                <input name="nivel" type="number" value="1" min="1" id="inNivel" oninput="calcVD()">
            </div>
            <div class="form-campo">
                <label>Valor de Desafio (VD)</label>
                <input name="valor_desafio" type="number" step="0.25" value="1" id="inVD">
            </div>
            <div id="vdPreview" class="vd-preview form-full" style="display:none;"></div>
            {% for attr, label in attrs %}
            <div class="form-campo">
                <label>{{ label }}</label>
                <input name="{{ attr }}" type="number" value="10" oninput="calcVD()">
            </div>
            {% empty %}
            <div class="form-campo"><label>Força</label><input name="forca" type="number" value="10"></div>
            <div class="form-campo"><label>Destreza</label><input name="destreza" type="number" value="10"></div>
            <div class="form-campo"><label>Constituição</label><input name="constituicao" type="number" value="10"></div>
            <div class="form-campo"><label>Inteligência</label><input name="inteligencia" type="number" value="10"></div>
            <div class="form-campo"><label>Sabedoria</label><input name="sabedoria" type="number" value="10"></div>
            <div class="form-campo"><label>Carisma</label><input name="carisma" type="number" value="10"></div>
            {% endfor %}
            <div class="form-campo">
                <label>Vida Máxima</label>
                <input name="vida_max" type="number" value="0">
            </div>
            <div class="form-campo">
                <label>Armadura</label>
                <input name="armadura" type="number" value="0">
            </div>
            <div class="form-campo">
                <label>Defesa</label>
                <input name="defesa" type="number" value="10">
            </div>
            <div class="form-campo">
                <label>Ataque 1</label>
                <input name="atk1" placeholder="Mordida">
            </div>
            <div class="form-campo">
                <label>Dano 1</label>
                <input name="dano1" placeholder="1d6+2">
            </div>
            <div class="form-campo">
                <label>Ataque 2</label>
                <input name="atk2" placeholder="">
            </div>
            <div class="form-campo">
                <label>Dano 2</label>
                <input name="dano2" placeholder="">
            </div>
            <div class="form-campo form-full">
                <label>Habilidades Especiais</label>
                <textarea name="habilidades" placeholder="Visão noturna, Resistência a veneno..."></textarea>
            </div>
            <div class="form-campo form-full">
                <label>Descrição</label>
                <textarea name="descricao"></textarea>
            </div>
            <div class="form-campo form-full">
                <label>Foto (opcional)</label>
                <input type="file" name="foto" accept="image/*">
            </div>
        </div>
        <div class="form-acoes">
            <a href="/campanha/{{ campanha.id }}/" style="padding:9px 20px;background:#222;color:#aaa;border:1px solid #444;text-decoration:none;">Cancelar</a>
            <button type="submit" class="btn-salvar" style="padding:9px 20px;">Criar Criatura</button>
        </div>
    </form>
</div>
<script>
function calcVD() {
    const nivel = parseInt(document.getElementById('inNivel').value || 1);
    const vd = Math.max(0.25, nivel * 0.5).toFixed(2);
    document.getElementById('inVD').value = vd;
    const div = document.getElementById('vdPreview');
    div.style.display = 'block';
    div.textContent = `VD sugerido: ${vd} (baseado no nível ${nivel})`;
}
</script>
</body>
</html>
